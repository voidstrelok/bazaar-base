services:
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - api
    networks:
      - tienda_network

  api:
    build: ./api
    ports:
      - "${API_PORT}:8080"
    depends_on:
      - db
    environment:
      - ConnectionStrings__Default=Server=db,1433;Database=${DB_NAME};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - JWT_SECRET=${JWT_SECRET}
      - PAYMENT_GATEWAY=${PAYMENT_GATEWAY}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER}
      - CLOUDINARY_URL=${CLOUDINARY_URL}
      - STORE_NAME=${STORE_NAME}
    networks:
      - tienda_network

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "${DB_PORT}:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - tienda_network

networks:
  tienda_network:
    driver: bridge

volumes:
  sqlserver_data:
