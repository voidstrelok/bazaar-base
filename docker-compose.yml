services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_ENABLE_CHECKOUT=${ENABLE_CHECKOUT:-true}
        - VITE_CONTACT_TYPE=${CONTACT_TYPE:-none}
        - VITE_CONTACT_VALUE=${CONTACT_VALUE:-}
        - VITE_CONTACT_MESSAGE=${CONTACT_MESSAGE:-Hola, me interesa el producto: {nombre}}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - tienda_network
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M

  api:
    build: ./api
    ports:
      - "${API_PORT}:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Server=db,1433;Database=${DB_NAME};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER:-TiendaApi}
      - Jwt__Audience=${JWT_AUDIENCE:-TiendaApiUsers}
      - Jwt__ExpiryMinutes=${JWT_EXPIRY_MINUTES:-60}
      - Payment__Gateway=${PAYMENT_GATEWAY:-transbank}
      - Storage__Provider=${STORAGE_PROVIDER:-local}
      - Storage__LocalPath=${LOCAL_STORAGE_PATH:-/app/uploads}
      - Cloudinary__Url=${CLOUDINARY_URL:-}
      - STORE_NAME=${STORE_NAME}
      - CORS__Origins=${CORS_ORIGINS:-http://localhost:3000}
      - Admin__Email=${ADMIN_EMAIL:-admin@tienda.com}
      - Admin__Password=${ADMIN_PASSWORD:-Admin@123456}
      - Admin__Nombre=${ADMIN_NOMBRE:-Administrador}
      - Features__EnableCheckout=${ENABLE_CHECKOUT:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tienda_network
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "${DB_PORT}:1433"
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$SA_PASSWORD -Q 'SELECT 1' -No || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - tienda_network
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M

networks:
  tienda_network:
    driver: bridge

volumes:
  sqlserver_data:
