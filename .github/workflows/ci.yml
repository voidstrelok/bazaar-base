name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-api:
    name: Build & Test API
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore api/TiendaApi.csproj
      - name: Build
        run: dotnet build api/TiendaApi.csproj --no-restore --configuration Release
      # Tests omitidos en esta fase (no hay proyecto de tests aún)

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000
          VITE_STORE_NAME: Test Store
          VITE_COLOR_PRIMARY: '#6366f1'
          VITE_COLOR_SECONDARY: '#f59e0b'
          VITE_PAYMENT_GATEWAY: transbank
